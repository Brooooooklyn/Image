[package]
edition = "2024"
name    = "napi_rs_image"
version = "0.0.0"

[lib]
# `rlib` (alongside the addon's `cdylib`) lets the `benches/` CodSpeed harness link
# the quantizer core as a normal Rust library. An rlib is a non-linked archive, so —
# unlike the `logo` bin below — it does NOT trip wasm-ld on napi_build's package-scoped
# export args; it is inert for the `napi build` cdylib/wasm outputs.
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "logo"
path = "logo.rs"
# `napi_build::setup()` emits package-scoped `--export=napi_register_wasm_v1`
# (and emnapi_*) link args that apply to every target in the crate, including
# this helper bin. Since Rust 1.96 stopped passing `--allow-undefined` on wasm
# targets, wasm-ld treats those missing exports as a hard error and the wasi
# build fails on `bin "logo"`. This bin is a one-off logo generator and is not
# part of the addon, so gate it behind an opt-in feature to keep cargo from
# building it during `napi build`. Build it with `cargo run --bin logo -F logo`.
required-features = ["logo"]

[features]
default            = ["binding", "oxipng/parallel"]
# Gates the `#[napi]` addon modules. On by default so the shipped addon is unchanged;
# the CodSpeed bench builds with `--no-default-features` to link only the pure
# quantizer core (no `napi_*` symbols, which Valgrind cannot resolve).
binding            = []
logo               = []
oxipng_libdeflater = ["oxipng/zopfli", "oxipng/parallel"]
with_simd          = ["mozjpeg-sys/nasm_simd_parallel_build"]

[dependencies]
fast_image_resize = { version = "6", features = ["image"] }
image             = { version = "0.25", default-features = false, features = ["jpeg", "ico", "png", "pnm", "tga", "tiff", "bmp", "webp", "hdr", "dds"] }
jpeg-decoder      = "0.3"
libavif           = { version = "0.14", default-features = false, features = ["codec-aom"] }
libc              = "0.2"
lodepng           = "3"
napi              = { version = "3.0.0", default-features = false, features = ["napi3"] }
napi-derive       = { version = "3.0.0", default-features = false, features = ["type-def"] }
num-complex       = "0.4"
num_cpus          = "1"
once_cell         = "1"
resvg             = "0.47"
rexif             = "0.7"
rgb               = "0.8"
svgtypes          = "0.16"

  [dependencies.oxipng]
  default-features = false
  version          = "10"

  [dependencies.mozjpeg-sys]
  default-features = false
  version          = "2"

[target.'cfg(not(all(target_os = "macos", target_arch = "x86_64")))'.dependencies]
libwebp-sys = { version = "0.14", default-features = false, features = ["std", "parallel", "avx2", "sse41", "neon"] }

[target.'cfg(all(target_os = "macos", target_arch = "x86_64"))'.dependencies]
libwebp-sys = { version = "0.14", default-features = false, features = ["std", "parallel", "generate-bindings"] }

# macOS-only HEIC decode via Apple's ImageIO/CoreGraphics. We ship no HEVC codec — Apple's OS holds
# the patent license — so all HEIC decoding goes through these OS API bindings. macOS-gated, so
# Linux/Windows/wasm builds never see objc2.
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-core-foundation = { version = "0.3", default-features = false, features = ["std", "CFBase", "CFData", "CFDictionary", "CFString", "CFNumber", "CFCGTypes"] }
objc2-core-graphics   = { version = "0.3", default-features = false, features = ["std", "CGImage", "CGColorSpace", "CGContext", "CGBitmapContext", "CGDataProvider"] }
objc2-image-io        = { version = "0.3", default-features = false, features = ["std", "CGImageSource", "CGImageProperties", "CGImageDestination", "objc2-core-graphics"] }

# Windows-only HEIC via the Windows Imaging Component (WIC). We ship no HEVC codec — the OS/Store
# HEVC extension holds the patent license. Target-gated so Linux/macOS/wasm never resolve `windows`.
# (Same posture as the macOS objc2 block above; inert for the --no-default-features CodSpeed bench.)
[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.62", features = [
  "Win32_Foundation",                    # HGLOBAL, WINCODEC_ERR_COMPONENTNOTFOUND, HRESULT
  "Win32_System_Com",                    # CoCreateInstance, CoInitializeEx, IStream, CLSCTX, STREAM_SEEK
  "Win32_System_Com_StructuredStorage",  # CreateStreamOnHGlobal, GetHGlobalFromStream, IPropertyBag2, PROPBAG2, PROPVARIANT, PropVariantToUInt16
  "Win32_System_Ole",                    # gates the VARIANT struct + IPropertyBag2::Write
  "Win32_System_Variant",                # VARENUM / VT_* / VARIANT::from(f32)
  "Win32_System_Memory",                 # GlobalLock / GlobalUnlock / GlobalSize
  "Win32_Graphics_Imaging",              # all IWIC* interfaces, GUIDs, WICConvertBitmapSource
] }

[build-dependencies]
napi-build = "2"

[dev-dependencies]
# Drop-in criterion replacement, imported as `criterion`: a plain `cargo bench` runs
# stock criterion, while `cargo codspeed build/run` switches the same benches to
# CodSpeed instrumentation in CI. Released in lockstep with the `cargo-codspeed` CLI.
criterion = { package = "codspeed-criterion-compat", version = "5" }

[[bench]]
harness = false
name    = "quantize"
